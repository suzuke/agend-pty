# Multiple agents with git worktree isolation
# Each agent gets its own branch (agend/<name>) to avoid conflicts.
# Usage: agend-pty daemon --config examples/multi-agent.yaml
defaults:
  backend: claude
  worktree: true

instances:
  frontend:
    working_directory: ~/projects/myapp
    skip_permissions: true
  backend:
    working_directory: ~/projects/myapp
    skip_permissions: true
